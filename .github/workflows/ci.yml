name: CI Pipeline

on:
  push: 
    branches: [main]
    paths:
     - 'server/**'
     - 'client/**'
     - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
     - 'server/**'
     - 'client/**'

jobs:
  server-lint:
    name: Server Lint Check
    runs-on: ubuntu-latest

    steps:
     - name: Checkout code
       uses: actions/checkout@v4
    
     - name: Set up Node.js
       uses: actions/setup-node@v4
       with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: server/package-lock.json

     - name: Install dependencies
       working-directory: ./server
       run: npm ci
    
     - name: Run ESLint
       working-directory: ./server
       run: npm run lint

  server-build:
    name: Server checks
    runs-on: ubuntu-latest
    needs: server-lint 

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: wc_fantasy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
            node-version-file: '.nvmrc'
            cache: 'npm'
            cache-dependency-path: server/package-lock.json


      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Build Typescript
        working-directory: ./server
        run: npm run build

      - name: Debug Environment
        working-directory: ./server
        run: |
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          echo "Current directory: $(pwd)"
          echo "Files in current directory:"
          ls -la dist/ || echo "dist/doesnt exist"
        
      - name: Run migrations
        working-directory: ./server
        env:
          DATABASE_URL: postgresql://postgres:admin@localhost:5432/wc_fantasy    
        run: |
          for file in $(ls src/db/migrations/*.sql | sort); do
            echo "Running $file"
            psql "$DATABASE_URL" -f "$file"
          done

      - name: Verify app starts
        working-directory: ./server
        env:
          PORT: 3000
          NODE_ENV: development
          DATABASE_URL: postgresql://postgres:admin@localhost:5432/wc_fantasy
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
           node dist/index.js &
           sleep 5
           curl -f http://localhost:3000/health || exit 1
           kill %1

  client-lint:
    name: Client Lint Check
    runs-on: ubuntu-latest

    steps:
     - name: Checkout code
       uses: actions/checkout@v4
    
     - name: Set up Node.js
       uses: actions/setup-node@v4
       with:
        node-version-file: '.nvmrc'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json

     - name: Install dependencies
       working-directory: ./client
       run: npm ci
    
     - name: Run ESLint
       working-directory: ./client
       run: npm run lint

  client-build:
    name: Client checks
    runs-on: ubuntu-latest
    needs: client-lint 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
            node-version-file: '.nvmrc'
            cache: 'npm'
            cache-dependency-path: client/package-lock.json


      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Build Vite app
        working-directory: ./client
        run: npm run build

      - name: Verify dist was created
        working-directory: ./client
        run: |
          ls -la dist/
          echo " client build complete"
       